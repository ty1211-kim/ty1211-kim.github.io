<!DOCTYPE HTML>
<html>
    <head>
        <title>TY의 주식공부</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            .stock-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 1.2em;
                margin-bottom: 1.5em;
            }
            .stock-card {
                background: #f7f7f7;
                border-radius: 8px;
                padding: 1.2em 1.4em;
                border-left: 4px solid #ccc;
                transition: box-shadow 0.2s;
            }
            .stock-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
            .stock-card .name {
                font-size: 0.8em;
                color: #888;
                margin-bottom: 0.3em;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            .stock-card .price {
                font-size: 1.7em;
                font-weight: 700;
                color: #222;
                margin-bottom: 0.2em;
            }
            .stock-card .change { font-size: 0.95em; font-weight: 600; }
            .stock-card.up   { border-left-color: #2e7d5a; }
            .stock-card.down { border-left-color: #c0392b; }
            .stock-card.flat { border-left-color: #aaa; }
            .change.up   { color: #2e7d5a; }
            .change.down { color: #c0392b; }
            .change.flat { color: #888; }
            .stock-updated { font-size: 0.78em; color: #aaa; margin-top: 1em; text-align: right; }
            @media (max-width: 600px) { .stock-grid { grid-template-columns: 1fr; } }
        </style>
    </head>
    <body class="is-preload">

        <div id="wrapper">

            <!-- Header -->
            <header id="header">
                <h1><a href="index.html">TY의 주식공부</a></h1>
                <nav class="links">
                    <ul>
                        <li><a href="index.html">주식 실시간 주가</a></li>
                    </ul>
                </nav>
                <nav class="main">
                    <ul>
                        <li class="menu">
                            <a class="fa-bars" href="#menu">Menu</a>
                        </li>
                    </ul>
                </nav>
            </header>

            <!-- Menu -->
            <section id="menu">
                <section>
                    <ul class="links">
                        <li><a href="index.html"><h3>주식 실시간 주가</h3><p>삼성전자 · 코스피 · 나스닥</p></a></li>
                    </ul>
                </section>
            </section>

            <!-- Main -->
            <div id="main">

                <article class="post">
                    <header>
                        <div class="title">
                            <h2>실시간 주가</h2>
                            <p>삼성전자 · 코스피 · 나스닥 — 1분마다 자동 갱신</p>
                        </div>
                    </header>

                    <div class="stock-grid">
                        <div class="stock-card" id="card-samsung">
                            <div class="name">삼성전자 (005930)</div>
                            <div class="price" id="price-samsung">—</div>
                            <div class="change" id="change-samsung">불러오는 중...</div>
                        </div>
                        <div class="stock-card" id="card-kospi">
                            <div class="name">코스피 지수</div>
                            <div class="price" id="price-kospi">—</div>
                            <div class="change" id="change-kospi">불러오는 중...</div>
                        </div>
                        <div class="stock-card" id="card-nasdaq">
                            <div class="name">나스닥 지수</div>
                            <div class="price" id="price-nasdaq">—</div>
                            <div class="change" id="change-nasdaq">불러오는 중...</div>
                        </div>
                    </div>

                    <p class="stock-updated" id="updated-time"></p>
                </article>

            </div>

            <!-- Sidebar -->
            <section id="sidebar">

                <section id="intro">
                    <header>
                        <h2>TY의 주식공부</h2>
                        <p>삼성전자 · 코스피 · 나스닥 실시간 주가 모니터링</p>
                    </header>
                </section>

                <section id="footer">
                    <p class="copyright">Design: <a href="http://html5up.net">HTML5 UP</a></p>
                </section>

            </section>

        </div>

        <!-- Scripts -->
        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>

        <script>
        const STOCKS = [
            { id: 'samsung', ticker: '005930.KS', currency: 'KRW' },
            { id: 'kospi',   ticker: '%5EKS11',   currency: 'KRW' },
            { id: 'nasdaq',  ticker: '%5EIXIC',    currency: 'USD' },
        ];

        function formatPrice(price, currency) {
            if (currency === 'KRW') return price.toLocaleString('ko-KR') + '원';
            return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatChange(change, changePct) {
            const sign = change >= 0 ? '+' : '';
            return `${sign}${change.toLocaleString('ko-KR', { maximumFractionDigits: 2 })} (${sign}${changePct.toFixed(2)}%)`;
        }

        async function fetchStock(stock) {
            const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${stock.ticker}?interval=1d&range=1d`;
            const res = await fetch(url);
            const data = await res.json();
            const meta = data.chart.result[0].meta;
            return {
                price: meta.regularMarketPrice,
                prev: meta.chartPreviousClose || meta.previousClose,
                currency: meta.currency || stock.currency,
            };
        }

        function updateCard(id, price, prev, currency) {
            const change = price - prev;
            const changePct = (change / prev) * 100;
            const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
            const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '—';

            document.getElementById('card-' + id).className = 'stock-card ' + dir;
            document.getElementById('price-' + id).textContent = formatPrice(price, currency);
            const el = document.getElementById('change-' + id);
            el.textContent = arrow + ' ' + formatChange(change, changePct);
            el.className = 'change ' + dir;
        }

        async function loadAll() {
            for (const stock of STOCKS) {
                try {
                    const { price, prev, currency } = await fetchStock(stock);
                    updateCard(stock.id, price, prev, currency);
                } catch (e) {
                    document.getElementById('change-' + stock.id).textContent = '데이터 불러오기 실패';
                }
            }
            document.getElementById('updated-time').textContent =
                '업데이트: ' + new Date().toLocaleString('ko-KR');
        }

        loadAll();
        setInterval(loadAll, 60000);
        </script>

    </body>
</html>
